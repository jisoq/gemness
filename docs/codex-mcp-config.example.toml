# gemness-mcp:start
[mcp_servers.gemness]
command = "uvx"
args = ["--from", "git+https://github.com/jisoq/gemness", "gemness", "start-mcp-server"]
startup_timeout_sec = 60
tool_timeout_sec = 600
required = false
enabled_tools = [
  "antigravity_health",
  "ask_antigravity",
  "start_antigravity",
  "follow_up_antigravity",
  "ask_antigravity_json",
  "review_current_diff_with_antigravity",
  "await_antigravity_run",
  "cancel_antigravity_run",
]
default_tools_approval_mode = "prompt"

[mcp_servers.gemness.tools."antigravity_health"]
approval_mode = "approve"

[mcp_servers.gemness.tools."ask_antigravity"]
approval_mode = "approve"

[mcp_servers.gemness.tools."start_antigravity"]
approval_mode = "prompt"

[mcp_servers.gemness.tools."follow_up_antigravity"]
approval_mode = "approve"

[mcp_servers.gemness.tools."ask_antigravity_json"]
approval_mode = "prompt"

[mcp_servers.gemness.tools."review_current_diff_with_antigravity"]
approval_mode = "prompt"

[mcp_servers.gemness.tools."await_antigravity_run"]
approval_mode = "approve"

[mcp_servers.gemness.tools."cancel_antigravity_run"]
approval_mode = "prompt"

[mcp_servers.gemness.env]
GEMNESS_OBSERVER_ENABLED = "true"
GEMNESS_OBSERVER_HOST = "127.0.0.1"
GEMNESS_OBSERVER_PORT = "56755"
GEMNESS_OBSERVER_START_ON_INIT = "true"
GEMNESS_TRANSCRIPT_DIR = "~/.gemness/transcripts"
GEMNESS_CODEX_HOST_CAPABILITIES_FILE = "~/.gemness/codex-host-capabilities.json"
GEMNESS_REDACT_RAW_BY_DEFAULT = "true"
GEMNESS_AGY_TIMEOUT = "600"
GEMNESS_AGY_CAPTURE_MODE = "winpty"
GEMNESS_AGY_HEARTBEAT_INTERVAL = "5"
GEMNESS_AGY_CONCURRENCY_LIMIT = "4"
# Optional:
# GEMNESS_AGY_COMMAND = "agy"
# gemness-mcp:end
